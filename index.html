<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Voice Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAFAF8;
    --panel: #FFFFFF;
    --ink: #1D1D1F;
    --ink-soft: #6E6E73;
    --line: #E9E9EB;
    --accent-1: #0A84FF;   /* arc-reactor blue */
    --accent-2: #34D6C4;   /* cyan edge */
    --accent-glow: rgba(10,132,255,0.18);
    --bubble-user: #F1F1F3;
    --bubble-jarvis: #FFFFFF;
    --danger: #E5484D;
    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --shadow-1: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.05);
    --shadow-orb: 0 20px 60px rgba(10,132,255,0.20);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  #app{
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ---------- Header ---------- */
  header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 2px 10px;
    flex-shrink: 0;
  }

  .wordmark{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wordmark .dot{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  }

  .stat-pill{
    font-size: 12px;
    color: var(--ink-soft);
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 6px 12px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }

  .stat-pill svg{ width: 12px; height: 12px; }

  /* ---------- Orb stage ---------- */
  .stage{
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 0 8px;
    position: relative;
  }

  .orb-wrap{
    position: relative;
    width: 168px;
    height: 168px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .ring{
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--accent-glow);
    opacity: 0;
  }

  .ring1{ width: 100%; height: 100%; }
  .ring2{ width: 130%; height: 130%; }

  .orb{
    width: 116px;
    height: 116px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #7fd8ff 0%, var(--accent-1) 45%, #0057c2 100%);
    box-shadow: var(--shadow-orb);
    position: relative;
    z-index: 2;
    animation: breathe 4.2s ease-in-out infinite;
    transition: box-shadow 0.3s ease;
  }

  .orb::after{
    content: '';
    position: absolute;
    inset: 14%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.55), transparent 60%);
  }

  @keyframes breathe{
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  #app.listening .orb{
    animation: pulseFast 1.1s ease-in-out infinite;
    box-shadow: 0 20px 70px rgba(10,132,255,0.36);
  }
  @keyframes pulseFast{
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.11); }
  }

  #app.listening .ring1{ animation: ripple 1.6s ease-out infinite; }
  #app.listening .ring2{ animation: ripple 1.6s ease-out infinite 0.4s; }
  @keyframes ripple{
    0% { transform: scale(0.9); opacity: 0.7; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  #app.thinking .orb{
    animation: think 0.9s ease-in-out infinite;
  }
  @keyframes think{
    0%, 100% { transform: scale(0.98) rotate(0deg); }
    50% { transform: scale(1.02) rotate(3deg); }
  }

  #app.speaking .orb{
    animation: speak 0.35s ease-in-out infinite alternate;
  }
  @keyframes speak{
    0% { transform: scale(1); }
    100% { transform: scale(1.045); }
  }

  .state-label{
    margin-top: 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    height: 18px;
  }

  .hint{
    font-size: 12px;
    color: #B0B0B5;
    margin-top: 2px;
  }

  /* ---------- Transcript ---------- */
  .transcript-wrap{
    flex: 1;
    min-height: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    margin: 14px 0 14px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-1);
    overflow: hidden;
  }

  .transcript-header{
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .transcript{
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .transcript::-webkit-scrollbar{ width: 5px; }
  .transcript::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 4px; }

  .empty-state{
    margin: auto;
    text-align: center;
    color: #C2C2C7;
    font-size: 13px;
    padding: 20px;
  }

  .row{
    display: flex;
    animation: rise 0.28s ease;
  }
  @keyframes rise{
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .row.me{ justify-content: flex-end; }
  .row.jarvis{ justify-content: flex-start; }

  .bubble{
    max-width: 78%;
    padding: 10px 14px;
    font-size: 14.5px;
    line-height: 1.42;
  }

  .row.me .bubble{
    background: var(--bubble-user);
    color: var(--ink);
    border-radius: 16px 16px 4px 16px;
  }

  .row.jarvis .bubble{
    background: var(--bubble-jarvis);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 16px 16px 16px 4px;
  }

  .speaker-label{
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
    display: block;
  }

  .instant-badge{
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent-1);
    background: rgba(10,132,255,0.08);
    padding: 2px 7px;
    border-radius: 999px;
    margin-top: 6px;
  }
  .instant-badge svg{ width: 9px; height: 9px; }

  /* ---------- Input bar ---------- */
  .inputbar{
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 2px 20px;
  }

  .mic-btn{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 6px 16px rgba(10,132,255,0.28);
    transition: transform 0.15s ease;
  }
  .mic-btn:active{ transform: scale(0.92); }
  .mic-btn svg{ width: 19px; height: 19px; fill: #fff; }

  #app.listening .mic-btn{
    background: linear-gradient(135deg, var(--danger), #ff7a7a);
  }

  .text-input{
    flex: 1;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 999px;
    padding: 12px 18px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
  }
  .text-input:focus{ border-color: var(--accent-1); }

  .send-btn{
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .send-btn svg{ width: 15px; height: 15px; fill: #fff; }
  .send-btn:disabled{ opacity: 0.3; cursor: default; }

  .unsupported-note{
    font-size: 11.5px;
    color: var(--ink-soft);
    text-align: center;
    padding-bottom: 6px;
  }

  @media (max-width: 400px){
    .orb-wrap{ width: 138px; height: 138px; }
    .orb{ width: 96px; height: 96px; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="wordmark"><span class="dot"></span> JARVIS</div>
    <div class="stat-pill">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M13 2 3 14h7l-1 8 11-14h-8z"/></svg>
      <span id="savedCount">0</span> saved
    </div>
  </header>

  <div class="stage">
    <div class="orb-wrap" id="orbWrap">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="orb" id="orb"></div>
    </div>
    <div class="state-label" id="stateLabel">Tap to talk</div>
    <div class="hint">Voice in, voice out — transcript below</div>
  </div>

  <div class="transcript-wrap">
    <div class="transcript-header">Transcript</div>
    <div class="transcript" id="transcript">
      <div class="empty-state" id="emptyState">Say "hi jarvis" to start —<br>your conversation will appear here.</div>
    </div>
  </div>

  <div class="unsupported-note" id="unsupportedNote" style="display:none;">
    Voice input isn't supported in this browser — type your message instead.
  </div>

  <div class="inputbar">
    <button class="mic-btn" id="micBtn" aria-label="Talk to Jarvis">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    </button>
    <input type="text" class="text-input" id="textInput" placeholder="Type to Jarvis…">
    <button class="send-btn" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
(function(){
  const app = document.getElementById('app');
  const orbWrap = document.getElementById('orbWrap');
  const stateLabel = document.getElementById('stateLabel');
  const transcript = document.getElementById('transcript');
  const emptyState = document.getElementById('emptyState');
  const micBtn = document.getElementById('micBtn');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const savedCountEl = document.getElementById('savedCount');
  const unsupportedNote = document.getElementById('unsupportedNote');

  const ASSISTANT_NAME = 'Jarvis';
  let history = [];       // {role: 'user'|'model', text}
  let apiCallsSaved = 0;
  let isBusy = false;

  // ---------- Local instant answers (mirrors voice_assistant.py try_local_answer) ----------
  function tryLocalAnswer(raw){
    const q = raw.trim().toLowerCase().replace(/[?!.]+$/, '');

    if (/\b(what'?s the time|current time|what time is it)\b/.test(q)){
      const now = new Date();
      return `It's ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}.`;
    }
    if (/\b(what'?s the date|today'?s date|what day is it)\b/.test(q)){
      const now = new Date();
      return `Today is ${now.toLocaleDateString([], {weekday:'long', year:'numeric', month:'long', day:'numeric'})}.`;
    }
    if (/^(hi|hello|hey|yo|good morning|good afternoon|good evening)\b/.test(q)){
      return 'Hello. Standing by.';
    }
    if (/\b(who are you|what'?s your name)\b/.test(q)){
      return `I'm ${ASSISTANT_NAME}, your voice assistant.`;
    }
    if (/^(thanks|thank you|thx|cheers)\b/.test(q)){
      return 'Anytime.';
    }
    const m = q.match(/(-?\d+(\.\d+)?)\s*([+\-x*/])\s*(-?\d+(\.\d+)?)/);
    if (m){
      const a = parseFloat(m[1]), op = m[3], b = parseFloat(m[4]);
      let result;
      if (op === '+') result = a + b;
      else if (op === '-') result = a - b;
      else if (op === 'x' || op === '*') result = a * b;
      else result = b !== 0 ? a / b : NaN;
      if (!Number.isNaN(result)){
        result = Number.isInteger(result) ? result : Math.round(result * 1000) / 1000;
        return `That's ${result}.`;
      }
    }
    return null;
  }

  // ---------- UI helpers ----------
  function setState(mode, label){
    app.classList.remove('listening', 'thinking', 'speaking');
    if (mode) app.classList.add(mode);
    stateLabel.textContent = label;
  }

  function addBubble(who, text, instant){
    emptyState.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'row ' + (who === 'me' ? 'me' : 'jarvis');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const label = document.createElement('span');
    label.className = 'speaker-label';
    label.textContent = who === 'me' ? 'Me' : ASSISTANT_NAME;
    bubble.appendChild(label);

    const body = document.createElement('div');
    body.textContent = text;
    bubble.appendChild(body);

    if (instant){
      const badge = document.createElement('div');
      badge.className = 'instant-badge';
      badge.innerHTML = '<svg viewBox="0 0 24 24"><path fill="currentColor" d="M13 2 3 14h7l-1 8 11-14h-8z"/></svg> instant · no API used';
      bubble.appendChild(badge);
    }

    row.appendChild(bubble);
    transcript.appendChild(row);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function bumpSaved(){
    apiCallsSaved += 1;
    savedCountEl.textContent = apiCallsSaved;
  }

  // ---------- Speech synthesis (voice out) ----------
  function speak(text){
    return new Promise((resolve) => {
      if (!('speechSynthesis' in window)){ resolve(); return; }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.02;
      utter.pitch = 1.0;
      utter.onstart = () => setState('speaking', 'Speaking…');
      utter.onend = () => { setState(null, 'Tap to talk'); resolve(); };
      utter.onerror = () => { setState(null, 'Tap to talk'); resolve(); };
      window.speechSynthesis.speak(utter);
    });
  }

  // ---------- Backend call (memory + personality live server-side) ----------
  async function askJarvis(message){
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        history: history.map(h => ({ role: h.role, text: h.text }))
      })
    });
    if (!res.ok) throw new Error('backend error');
    const data = await res.json();
    return data.reply;
  }

  // ---------- Core handler for a finished user utterance ----------
  async function handleUserMessage(text){
    if (!text || !text.trim() || isBusy) return;
    isBusy = true;
    addBubble('me', text);
    history.push({ role: 'user', text });

    const local = tryLocalAnswer(text);
    if (local !== null){
      bumpSaved();
      addBubble('jarvis', local, true);
      history.push({ role: 'model', text: local });
      await speak(local);
      isBusy = false;
      return;
    }

    setState('thinking', 'Thinking…');
    try {
      const reply = await askJarvis(text);
      addBubble('jarvis', reply);
      history.push({ role: 'model', text: reply });
      await speak(reply);
    } catch (err){
      const fallback = "I can't reach my backend right now — check the /api/chat route on your Vercel deployment.";
      addBubble('jarvis', fallback);
      await speak(fallback);
    }
    isBusy = false;
  }

  // ---------- Speech recognition (voice in) ----------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let listening = false;

  if (SR){
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = () => {
      listening = true;
      setState('listening', 'Listening…');
    };

    recognition.onresult = (event) => {
      let finalText = '';
      for (let i = event.resultIndex; i < event.results.length; i++){
        if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
      }
      if (finalText.trim()){
        recognition.stop();
        handleUserMessage(finalText.trim());
      }
    };

    recognition.onerror = () => {
      listening = false;
      setState(null, 'Tap to talk');
    };

    recognition.onend = () => {
      listening = false;
      if (!app.classList.contains('thinking') && !app.classList.contains('speaking')){
        setState(null, 'Tap to talk');
      }
    };
  } else {
    unsupportedNote.style.display = 'block';
    micBtn.style.opacity = '0.4';
    micBtn.style.cursor = 'not-allowed';
  }

  orbWrap.addEventListener('click', toggleListening);
  micBtn.addEventListener('click', toggleListening);

  function toggleListening(){
    if (!recognition || isBusy) return;
    if (listening){
      recognition.stop();
    } else {
      window.speechSynthesis.cancel();
      try { recognition.start(); } catch(e){ /* already started */ }
    }
  }

  // ---------- Text fallback ----------
  function sendTyped(){
    const val = textInput.value;
    if (!val.trim()) return;
    textInput.value = '';
    handleUserMessage(val.trim());
  }
  sendBtn.addEventListener('click', sendTyped);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendTyped();
  });
})();
</script>
</body>
</html>
